<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Google Maps</title>
  </head>
  <body>
    <div role="search">
      <form class="NhWQq">
        <input id="searchboxinput" name="q" role="combobox" aria-label="Search Google Maps" value="Alpha Tokyo" />
        <button id="searchbox-searchbutton" aria-label="Search">Search</button>
      </form>
      <div class="lSDxNd" aria-hidden="true"></div>
    </div>
    <div role="feed">
      <a href="/maps/place/alpha">Alpha Tokyo</a>
    </div>
    <div role="main">
      <h1 class="fontHeadlineLarge">Alpha</h1>
      <button data-item-id="address">1 Example Street, Tokyo 100-0001</button>
      <button jsaction="pane.rating.category">French restaurant</button>
      <button data-item-id="save" aria-label="Save">Save</button>
    </div>
  </body>
</html>
