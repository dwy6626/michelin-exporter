<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Google Maps Save Surface</title>
  </head>
  <body>
    <button aria-label="Google Account">Account</button>
    <button aria-label="Saved">Saved</button>
    <button role="tab">Lists</button>
    <button>New list</button>
    <div role="dialog">
      <button>Create list</button>
      <input aria-label="List name" type="text" value="Tokyo Michelin ⭐⭐" />
      <button>Create</button>
      <textarea aria-label="Add a note">Seasonal tasting menu.</textarea>
      <button role="menuitemcheckbox">Tokyo Michelin ⭐⭐</button>
    </div>
  </body>
</html>
